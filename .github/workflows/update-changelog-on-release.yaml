name: Update changelog
on:
  release:
    types: [released]

jobs:
  debug_info:
    name: Debug info
    runs-on: ubuntu-24.04
    steps:
      - name: Print github context JSON
        run: |
          cat <<EOF
          ${{ toJson(github) }}
          EOF

  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}
      - name: Update CHANGELOG
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.tag_name }}
          release-notes: ${{ github.event.release.body }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: changelog/${{ github.event.release.tag_name }}
          base: ${{ github.event.release.target_commitish }}
          commit-message: "docs: update CHANGELOG for ${{ github.event.release.tag_name }}"
          title: "docs: update CHANGELOG for ${{ github.event.release.tag_name }}"
          body: "Automated changelog update for release ${{ github.event.release.tag_name }}."
          add-paths: CHANGELOG.md
